<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#151515">
<title>Bingo Host 受付 Ver.1</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#f3f4f6;color:#171717;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif}
button,input,select{font:inherit}button{cursor:pointer}
header{position:sticky;top:0;z-index:10;background:#151515;color:#fff;padding:13px 14px}
header h1{font-size:20px;margin:0}.sub{font-size:12px;opacity:.82;margin-top:3px}
main{max-width:850px;margin:auto;padding:12px}.panel{background:#fff;border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:0 2px 9px #00000010}
.entry{border:3px solid #e3aa00;background:#fff6cf}
h2{font-size:20px;margin:0 0 10px}.label{font-weight:900;font-size:18px;margin:11px 0 6px}
input,select{width:100%;border:2px solid #777;border-radius:12px;padding:13px;background:#fff}
#name{font-size:22px}.row{display:grid;grid-template-columns:1fr 135px;gap:8px}
#card{font-size:30px;font-weight:900;text-align:center;border:3px solid #111}
.primary{border:0;border-radius:12px;background:#1267d6;color:#fff;font-weight:900;min-height:64px}
.secondary{border:1px solid #aaa;border-radius:10px;background:#fff;padding:10px 12px;font-weight:800}
.notice{margin-top:10px;padding:11px;border-radius:10px;background:#fff;min-height:44px;line-height:1.45}.ok{background:#e8f7ea;color:#145e20}.err{background:#ffe7e7;color:#8d1717}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px}.stat{background:#eef2f7;border-radius:10px;text-align:center;padding:8px 3px;font-weight:900}.stat small{display:block;font-size:11px;color:#666}
.toolbar{display:grid;grid-template-columns:1fr 120px;gap:7px;margin:10px 0}.toolbar input{border:1px solid #aaa;font-size:16px}
.person{border:1px solid #ddd;border-radius:13px;padding:11px;margin-top:8px}.head{display:flex;justify-content:space-between;gap:8px;align-items:center}.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.chip{display:inline-flex;gap:5px;align-items:center;background:#f0f1f4;border-radius:999px;padding:6px 7px 6px 10px;font-weight:800}.chip button{border:0;background:#d4d6da;border-radius:50%;width:23px;height:23px;padding:0}
.pill{background:#151515;color:#fff;border-radius:999px;padding:5px 9px;font-size:13px;font-weight:900}.recent{background:#eef6ff;border-radius:11px;padding:10px;line-height:1.7}
.actions{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}.empty{text-align:center;color:#666;padding:18px}.hint{font-size:13px;color:#555;margin-top:7px;line-height:1.5}
@media(max-width:520px){.row{grid-template-columns:1fr 120px}}
</style>
</head>
<body>
<header><h1>Bingo Host</h1><div class="sub">A〜E 全250枚対応・受付 Ver.1</div></header>
<main>
<form id="form" class="panel entry">
<h2>参加者を登録</h2>
<div class="label">① 名前</div>
<input id="name" autocomplete="off" placeholder="例：ちゃちゃ">
<div class="label">② カード番号</div>
<div class="row">
<input id="card" inputmode="text" autocomplete="off" placeholder="161">
<button id="registerBtn" class="primary" type="button">登録</button>
</div>
<div class="hint">「161」のような通し番号でも、「D-011」のようなカードIDでも登録できます。同じ人は名前を残したまま番号だけ連続入力できます。</div>
<div id="notice" class="notice">準備完了。名前とカード番号を入力して「登録」を押してください。</div>
<div class="actions"><button id="next" class="secondary" type="button">次の人</button><button id="focusCard" class="secondary" type="button">番号欄へ移動</button></div>
</form>

<div class="panel">
<div class="head"><h2>登録状況</h2><span id="peoplePill" class="pill">0人 / 0枚</span></div>
<div class="stats">
<div class="stat"><span id="aCount">0</span><small>A</small></div>
<div class="stat"><span id="bCount">0</span><small>B</small></div>
<div class="stat"><span id="cCount">0</span><small>C</small></div>
<div class="stat"><span id="dCount">0</span><small>D</small></div>
<div class="stat"><span id="eCount">0</span><small>E</small></div>
<div class="stat"><span id="remain">250</span><small>未登録</small></div>
</div>
<div id="recent" class="recent" style="margin-top:10px">まだ登録されていません。</div>
<div class="toolbar">
<input id="search" placeholder="名前・番号で検索">
<select id="sort"><option value="input">登録順</option><option value="name">名前順</option><option value="card">番号順</option></select>
</div>
<div class="actions">
<button id="copy" class="secondary" type="button">一覧コピー</button>
<button id="backup" class="secondary" type="button">バックアップ</button>
<label class="secondary">復元<input id="restore" type="file" accept=".json" hidden></label>
</div>
<div id="list"></div>
</div>
</main>

 if(q)arr=arr.filter(r=>r.name.toLowerCase().includes(q)||r.cardId.toLowerCase().includes(q)||String(globalNo(r.cardId)).includes(q));
 let groups=[];for(let r of arr){let g=groups.find(x=>x.name===r.name);if(!g){g={name:r.name,items:[]};groups.push(g)}g.items.push(r)}
 $("list").innerHTML=groups.length?groups.map(g=>`<div class="person"><div class="head"><b>${esc(g.name)}</b><span class="pill">${g.items.length}口</span></div><div class="chips">${g.items.map(r=>`<span class="chip">No.${globalNo(r.cardId)} <small>${r.cardId}</small><button type="button" data-del="${r.key}">×</button></span>`).join("")}</div></div>`).join(""):'<div class="empty">該当する登録はありません。</div>';
 document.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>remove(b.dataset.del));
 let people=new Set(state.regs.map(r=>r.name)).size;$("peoplePill").textContent=`${people}人 / ${state.regs.length}枚`;$("remain").textContent=250-state.regs.length;
 for(let g of "ABCDE")$(g.toLowerCase()+"Count").textContent=state.regs.filter(r=>r.cardId[0]===g).length;
 $("recent").innerHTML=state.regs.length?"<b>直近の登録</b><br>"+state.regs.slice(-5).reverse().map(r=>`✅ ${esc(r.name)}　No.${globalNo(r.cardId)}（${r.cardId}）`).join("<br>"):"まだ登録されていません。";
}
async function copyList(){let t=state.regs.map((r,i)=>`${i+1}. ${r.name}　No.${globalNo(r.cardId)}（${r.cardId}）`).join("\n");if(!t)return note("コピーする登録がありません。","err");try{await navigator.clipboard.writeText(t);note("✅ 一覧をコピーしました。","ok")}catch(e){prompt("コピーしてください",t)}}
function backup(){let a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:"application/json"}));a.download="bingo-host-backup.json";a.click()}
function restore(f){let rd=new FileReader();rd.onload=()=>{try{let x=JSON.parse(rd.result);if(!x||!Array.isArray(x.regs))throw 0;state=x;save();note("✅ 復元しました。","ok")}catch(e){note("⚠️ 復元できませんでした。","err")}};rd.readAsText(f)}
const registerBtn=$("registerBtn");
registerBtn.addEventListener("click",function(e){e.preventDefault();e.stopPropagation();add();});
$("card").addEventListener("keydown",function(e){if(e.key==="Enter"){e.preventDefault();add();}});
$("name").addEventListener("keydown",function(e){if(e.key==="Enter"){e.preventDefault();$("card").focus();}});
$("next").onclick=()=>{$("name").value="";$("card").value="";$("name").focus()};
$("focusCard").onclick=()=>$("card").focus();
$("search").oninput=render;$("sort").onchange=render;$("copy").onclick=copyList;$("backup").onclick=backup;
$("restore").onchange=e=>{if(e.target.files[0])restore(e.target.files[0]);e.target.value=""};
load();render();
</script>
</body></html>
